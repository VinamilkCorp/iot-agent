<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>IoT Scale</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d0d0d; color: #ccc; display: flex; flex-direction: column; height: 100vh; }

  header { padding: 10px 20px; background: #161616; border-bottom: 1px solid #222; display: flex; align-items: center; }
  header h1 { font-size: 1rem; color: #fff; flex: 1; }

  #scale-bar { padding: 8px 20px; background: #111; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 24px; font-size: 0.8rem; }
  .scale-val  { font-size: 1.6rem; font-weight: 700; color: #fff; }
  .scale-unit { font-size: 0.9rem; color: #888; margin-left: 4px; }
  #scale-meta { color: #555; }

  nav { display: flex; background: #111; border-bottom: 1px solid #222; }
  nav button { background: none; border: none; color: #666; padding: 8px 20px; font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; font-family: monospace; }
  nav button:hover { color: #ccc; }
  nav button.active { color: #fff; border-bottom-color: #4caf50; }

  .tab { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab.active { display: flex; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222; flex: 1; overflow: hidden; }
  .panel { background: #0d0d0d; display: flex; flex-direction: column; overflow: hidden; }
  .panel-title { padding: 6px 14px; font-size: 0.72rem; color: #555; background: #111; border-bottom: 1px solid #1e1e1e; display: flex; justify-content: space-between; align-items: center; }
  .panel-title button { font-size: 0.7rem; background: #1e1e1e; border: 1px solid #333; color: #888; padding: 2px 8px; cursor: pointer; border-radius: 4px; }
  .panel-title button:hover { color: #fff; }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 0.78rem; line-height: 1.6; }

  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line.info   { color: #ccc; }
  .log-line.warn   { color: #f0a500; }
  .log-line.error  { color: #e53935; }
  .log-line.weight { color: #4caf50; }

  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  th { text-align: left; color: #555; padding: 4px 8px; border-bottom: 1px solid #1e1e1e; }
  td { padding: 4px 8px; border-bottom: 1px solid #111; }
  td.scale-port { color: #4caf50; }
  .empty { color: #444; font-style: italic; }

  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.green  { background: #4caf50; }
  .dot.yellow { background: #f0a500; }
  .dot.red    { background: #e53935; }
  .dot.grey   { background: #555; }

  #tab-monitor { padding: 16px; gap: 12px; }
  #monitor-toolbar { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; flex-wrap: wrap; }
  #monitor-toolbar label { color: #555; }
  #monitor-toolbar select, #monitor-toolbar input { background: #1e1e1e; border: 1px solid #333; color: #ccc; padding: 3px 8px; font-family: monospace; font-size: 0.78rem; border-radius: 4px; }
  #monitor-toolbar button { background: #1e1e1e; border: 1px solid #333; color: #888; padding: 3px 10px; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 0.78rem; }
  #monitor-toolbar button:hover { color: #fff; }
  #chart-wrap { flex: 1; position: relative; min-height: 0; }
  canvas#chart { width: 100%; height: 100%; display: block; }
  #monitor-stats { display: flex; gap: 24px; font-size: 0.78rem; color: #555; flex-wrap: wrap; }
  #monitor-stats span b { color: #ccc; }
  #no-scale-msg { color: #444; font-style: italic; font-size: 0.85rem; text-align: center; margin-top: 40px; }
</style>
</head>
<body>

<header>
  <h1>⚖ IoT Scale Dashboard</h1>
</header>

<div id="scale-bar">
  <div>
    <span class="dot yellow" id="scale-dot"></span>
    <span id="scale-status-text">Waiting for scale…</span>
  </div>
  <div>
    <span class="scale-val" id="weight-val">—</span>
    <span class="scale-unit" id="weight-unit"></span>
  </div>
  <div id="scale-meta"></div>
</div>

<nav>
  <button class="active" onclick="showTab('overview')">Overview</button>
  <button onclick="showTab('monitor')">Weight Monitor</button>
  <button onclick="showTab('log')">Log</button>
</nav>

<div class="tab active" id="tab-overview">
  <div class="grid">
    <div class="panel">
      <div class="panel-title"><span>ALL PORTS</span><button onclick="loadPorts()">↻ Refresh</button></div>
      <div class="panel-body" id="ports-body"><span class="empty">Loading…</span></div>
    </div>
    <div class="panel">
      <div class="panel-title"><span>SCALE PORTS</span><button onclick="loadScalePorts()">↻ Refresh</button></div>
      <div class="panel-body" id="scale-ports-body"><span class="empty">Loading…</span></div>
    </div>
  </div>
</div>

<div class="tab" id="tab-monitor">
  <div id="monitor-toolbar">
    <label>Window <select id="window-select">
      <option value="60">60 s</option>
      <option value="120">2 min</option>
      <option value="300" selected>5 min</option>
      <option value="600">10 min</option>
    </select></label>
    <label>Threshold <input id="threshold-input" type="number" step="0.001" placeholder="e.g. 0.5" style="width:90px" /></label>
    <button onclick="clearHistory()">Clear</button>
    <button onclick="exportCsv()">Export CSV</button>
  </div>
  <div id="chart-wrap">
    <canvas id="chart"></canvas>
    <div id="no-scale-msg">No scale connected — waiting for data…</div>
  </div>
  <div id="monitor-stats">
    <span>Points: <b id="stat-count">0</b></span>
    <span>Min: <b id="stat-min">—</b></span>
    <span>Max: <b id="stat-max">—</b></span>
    <span>Avg: <b id="stat-avg">—</b></span>
    <span>Last: <b id="stat-last">—</b></span>
  </div>
</div>

<div class="tab" id="tab-log">
  <div class="panel" style="flex:1">
    <div class="panel-title"><span>LOG</span><button onclick="clearLog()">Clear</button></div>
    <div class="panel-body" id="log-body"></div>
  </div>
</div>

<script>
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('nav button')[['overview','monitor','log'].indexOf(name)].classList.add('active');
  if (name === 'monitor') drawChart();
}

// ── IPC events from main process ──────────────────────────────────────────────
window.scale.onEvent((data) => {
  if (data.event === 'connected') {
    setScaleStatus('green', 'Scale connected', `${data.path} @ ${data.baudRate} baud`);
    log(`Scale connected: ${data.path} @ ${data.baudRate} baud`);
    loadScalePorts();
  }
  if (data.event === 'disconnected') {
    setScaleStatus('yellow', 'Waiting for scale…', '');
    document.getElementById('weight-val').textContent = '—';
    document.getElementById('weight-unit').textContent = '';
    log('Scale disconnected', 'warn');
  }
  if (data.event === 'weight') {
    document.getElementById('weight-val').textContent = data.weight;
    document.getElementById('weight-unit').textContent = data.unit;
    log(`Weight: ${data.weight} ${data.unit}  [${data.model}]`, 'weight');
    pushReading(data.weight, data.unit);
  }
  if (data.event === 'error') {
    log(`Error: ${data.message}`, 'error');
  }
});

function setScaleStatus(dot, text, meta = '') {
  document.getElementById('scale-dot').className = `dot ${dot}`;
  document.getElementById('scale-status-text').textContent = text;
  document.getElementById('scale-meta').textContent = meta;
}

// ── Log ───────────────────────────────────────────────────────────────────────
const logEl = document.getElementById('log-body');
function log(msg, cls = 'info') {
  const line = document.createElement('div');
  line.className = `log-line ${cls}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 500) logEl.removeChild(logEl.firstChild);
}
function clearLog() { logEl.innerHTML = ''; }

// ── Ports ─────────────────────────────────────────────────────────────────────
function renderPortsTable(ports, scalePaths = new Set()) {
  if (!ports.length) return '<span class="empty">No ports found</span>';
  return `<table><tr><th>Path</th><th>Manufacturer</th><th>VID</th><th>PID</th></tr>
    ${ports.map(p => `<tr>
      <td class="${scalePaths.has(p.path) ? 'scale-port' : ''}">${p.path}</td>
      <td>${p.manufacturer || '—'}</td><td>${p.vendorId || '—'}</td><td>${p.productId || '—'}</td>
    </tr>`).join('')}</table>`;
}
async function loadPorts() {
  document.getElementById('ports-body').innerHTML = '<span class="empty">Loading…</span>';
  const [all, scale] = await Promise.all([window.scale.listPorts(), window.scale.listScalePorts()]);
  document.getElementById('ports-body').innerHTML = renderPortsTable(all, new Set(scale.map(p => p.path)));
}
async function loadScalePorts() {
  document.getElementById('scale-ports-body').innerHTML = '<span class="empty">Loading…</span>';
  document.getElementById('scale-ports-body').innerHTML = renderPortsTable(await window.scale.listScalePorts());
}
loadPorts(); loadScalePorts();

// ── Weight history & chart ────────────────────────────────────────────────────
const history = [];
let currentUnit = '';

function pushReading(weight, unit) {
  currentUnit = unit;
  history.push({ t: new Date(), w: weight, unit });
  const cutoff = Date.now() - 600_000;
  while (history.length && history[0].t.getTime() < cutoff) history.shift();
  updateStats();
  if (document.getElementById('tab-monitor').classList.contains('active')) drawChart();
}

function clearHistory() { history.length = 0; updateStats(); drawChart(); }
function windowSec() { return parseInt(document.getElementById('window-select').value, 10); }
function threshold()  { return parseFloat(document.getElementById('threshold-input').value) || null; }

function visiblePoints() {
  const cutoff = Date.now() - windowSec() * 1000;
  return history.filter(p => p.t.getTime() >= cutoff);
}

function updateStats() {
  const pts = visiblePoints();
  document.getElementById('stat-count').textContent = pts.length;
  if (!pts.length) { ['stat-min','stat-max','stat-avg','stat-last'].forEach(id => document.getElementById(id).textContent = '—'); return; }
  const vals = pts.map(p => p.w);
  const fmt = v => `${v.toFixed(3)} ${currentUnit}`;
  document.getElementById('stat-min').textContent  = fmt(Math.min(...vals));
  document.getElementById('stat-max').textContent  = fmt(Math.max(...vals));
  document.getElementById('stat-avg').textContent  = fmt(vals.reduce((a,b)=>a+b,0)/vals.length);
  document.getElementById('stat-last').textContent = fmt(vals[vals.length-1]);
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const wrap   = document.getElementById('chart-wrap');
  const noMsg  = document.getElementById('no-scale-msg');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const pts = visiblePoints();
  if (!pts.length) { noMsg.style.display = 'block'; return; }
  noMsg.style.display = 'none';

  const W = canvas.width, H = canvas.height;
  const PAD = { top: 20, right: 20, bottom: 36, left: 60 };
  const cw = W - PAD.left - PAD.right, ch = H - PAD.top - PAD.bottom;

  const vals  = pts.map(p => p.w);
  const times = pts.map(p => p.t.getTime());
  let minV = Math.min(...vals), maxV = Math.max(...vals);
  if (minV === maxV) { minV -= 0.5; maxV += 0.5; }
  const rangeV = maxV - minV;
  const minT = times[0], maxT = times[times.length - 1];
  const rangeT = maxT - minT || 1;

  const xOf = t => PAD.left + ((t - minT) / rangeT) * cw;
  const yOf = v => PAD.top  + (1 - (v - minV) / rangeV) * ch;

  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const v = minV + (rangeV * i / 5), y = yOf(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillText(v.toFixed(3), PAD.left - 6, y + 3);
  }

  ctx.textAlign = 'center'; ctx.fillStyle = '#555';
  const xTicks = Math.min(6, pts.length);
  for (let i = 0; i <= xTicks; i++) {
    const t = minT + (rangeT * i / xTicks);
    ctx.fillText(new Date(t).toLocaleTimeString(), xOf(t), H - PAD.bottom + 16);
  }

  const thr = threshold();
  if (thr !== null && thr >= minV && thr <= maxV) {
    ctx.strokeStyle = '#e53935'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    const y = yOf(thr);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e53935'; ctx.textAlign = 'left';
    ctx.fillText(`threshold: ${thr}`, PAD.left + 4, y - 4);
  }
  ctx.setLineDash([]);

  ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((p, i) => { const x = xOf(p.t.getTime()), y = yOf(p.w); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke();

  ctx.lineTo(xOf(times[times.length-1]), PAD.top + ch);
  ctx.lineTo(xOf(times[0]), PAD.top + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(76,175,80,0.08)'; ctx.fill();

  ctx.fillStyle = '#4caf50';
  pts.forEach(p => { ctx.beginPath(); ctx.arc(xOf(p.t.getTime()), yOf(p.w), 3, 0, Math.PI * 2); ctx.fill(); });

  ctx.fillStyle = '#555'; ctx.textAlign = 'left'; ctx.font = '10px monospace';
  ctx.fillText(currentUnit, 4, PAD.top);
}

window.addEventListener('resize', () => {
  if (document.getElementById('tab-monitor').classList.contains('active')) drawChart();
});
document.getElementById('window-select').addEventListener('change', () => { updateStats(); drawChart(); });
document.getElementById('threshold-input').addEventListener('input', drawChart);

function exportCsv() {
  const rows = ['time,weight,unit', ...history.map(p => `${p.t.toISOString()},${p.w},${p.unit}`)];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'weight-log.csv' });
  a.click();
}
</script>
</body>
</html>
