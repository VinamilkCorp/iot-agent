<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IoT Scale</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: monospace;
        background: #0d0d0d;
        color: #ccc;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        padding: 10px 20px;
        background: #161616;
        border-bottom: 1px solid #222;
        display: flex;
        align-items: center;
      }
      header h1 {
        font-size: 1rem;
        color: #fff;
        flex: 1;
      }

      #scale-bar {
        padding: 8px 20px;
        background: #111;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        align-items: center;
        gap: 24px;
        font-size: 0.8rem;
      }
      .scale-val {
        font-size: 1.6rem;
        font-weight: 700;
        color: #fff;
      }
      .scale-unit {
        font-size: 0.9rem;
        color: #888;
        margin-left: 4px;
      }
      #scale-meta {
        color: #555;
      }

      nav {
        display: flex;
        background: #111;
        border-bottom: 1px solid #222;
      }
      nav button {
        background: none;
        border: none;
        color: #666;
        padding: 8px 20px;
        font-size: 0.8rem;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        font-family: monospace;
      }
      nav button:hover {
        color: #ccc;
      }
      nav button.active {
        color: #fff;
        border-bottom-color: #4caf50;
      }

      .tab {
        display: none;
        flex: 1;
        overflow: hidden;
        flex-direction: column;
      }
      .tab.active {
        display: flex;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: #222;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel-title {
        padding: 6px 14px;
        font-size: 0.72rem;
        color: #555;
        background: #111;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .panel-title button {
        font-size: 0.7rem;
        background: #1e1e1e;
        border: 1px solid #333;
        color: #888;
        padding: 2px 8px;
        cursor: pointer;
        border-radius: 4px;
      }
      .panel-title button:hover {
        color: #fff;
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
        font-size: 0.78rem;
        line-height: 1.6;
      }

      .log-line {
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-line.info {
        color: #ccc;
      }
      .log-line.warn {
        color: #f0a500;
      }
      .log-line.error {
        color: #e53935;
      }
      .log-line.weight {
        color: #4caf50;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
      }
      th {
        text-align: left;
        color: #555;
        padding: 4px 8px;
        border-bottom: 1px solid #1e1e1e;
      }
      td {
        padding: 4px 8px;
        border-bottom: 1px solid #111;
      }
      td.scale-port {
        color: #4caf50;
      }
      .empty {
        color: #444;
        font-style: italic;
      }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .dot.green {
        background: #4caf50;
      }
      .dot.yellow {
        background: #f0a500;
      }
      .dot.red {
        background: #e53935;
      }
      .dot.grey {
        background: #555;
      }


      #login-screen {
        position: fixed;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        gap: 16px;
      }
      #login-screen h2 {
        color: #fff;
        font-size: 1.1rem;
      }
      #login-screen p {
        color: #555;
        font-size: 0.8rem;
      }
      #login-screen .dot-spin {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      #login-error {
        color: #e53935;
        font-size: 0.8rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <h2>⚖ IoT Scale</h2>
      <div class="dot-spin"></div>
      <p id="login-status">Connecting to authentication server…</p>
      <p id="login-error"></p>
    </div>

    <header>
      <h1>⚖ IoT Scale Dashboard</h1>
    </header>

    <div id="scale-bar">
      <div>
        <span class="dot yellow" id="scale-dot"></span>
        <span id="scale-status-text">Waiting for scale…</span>
      </div>
      <div>
        <span class="scale-val" id="weight-val">—</span>
        <span class="scale-unit" id="weight-unit"></span>
      </div>
      <div id="scale-meta"></div>
    </div>

    <nav>
      <button class="active" onclick="showTab('overview')">Overview</button>
      <button onclick="showTab('log')">Log</button>
    </nav>

    <div class="tab active" id="tab-overview">
      <div class="grid">
        <div class="panel">
          <div class="panel-title">
            <span>ALL PORTS</span
            ><button onclick="loadPorts()">↻ Refresh</button>
          </div>
          <div class="panel-body" id="ports-body">
            <span class="empty">Loading…</span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">
            <span>SCALE PORTS</span
            ><button onclick="loadScalePorts()">↻ Refresh</button>
          </div>
          <div class="panel-body" id="scale-ports-body">
            <span class="empty">Loading…</span>
          </div>
        </div>
      </div>
    </div>

    <div class="tab" id="tab-log">
      <div class="panel" style="flex: 1">
        <div class="panel-title">
          <span>LOG</span
          ><span style="display: flex; gap: 6px"
            ><button id="btn-pause-log" onclick="toggleLog()">⏸ Pause</button
            ><button onclick="clearLog()">Clear</button></span
          >
        </div>
        <div class="panel-body" id="log-body"></div>
      </div>
    </div>

    <!-- Update overlay -->
    <div id="update-overlay" style="display:none;position:fixed;inset:0;background:#0d0d0d;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:monospace;color:#ccc">
      <h2 style="color:#fff;font-size:1.1rem">⚖ IoT Scale</h2>
      <p id="update-msg" style="font-size:0.85rem;color:#888"></p>
      <div id="update-bar-wrap" style="display:none;width:260px;background:#1e1e1e;border-radius:4px;overflow:hidden;height:6px">
        <div id="update-bar" style="height:100%;width:0%;background:#4caf50;transition:width 0.3s"></div>
      </div>
      <button id="update-install-btn" onclick="window.scale.installUpdate()" style="display:none;background:#1e1e1e;border:1px solid #333;color:#4caf50;padding:6px 18px;cursor:pointer;border-radius:4px;font-family:monospace;font-size:0.85rem">Restart &amp; Install</button>
    </div>

    <script>
      (function () {
        const overlay = document.getElementById('update-overlay');
        const msg = document.getElementById('update-msg');
        const barWrap = document.getElementById('update-bar-wrap');
        const bar = document.getElementById('update-bar');
        const installBtn = document.getElementById('update-install-btn');

        window.scale.onUpdateStatus((data) => {
          switch (data.status) {
            case 'checking':
              overlay.style.display = 'flex';
              msg.textContent = 'Checking for updates…';
              break;
            case 'available':
              msg.textContent = `Update v${data.version} found — downloading…`;
              barWrap.style.display = 'block';
              break;
            case 'downloading':
              overlay.style.display = 'flex';
              barWrap.style.display = 'block';
              bar.style.width = data.percent + '%';
              msg.textContent = `Downloading update… ${data.percent}%`;
              break;
            case 'downloaded':
              bar.style.width = '100%';
              msg.textContent = `v${data.version} ready to install.`;
              installBtn.style.display = 'block';
              break;
            case 'not-available':
              overlay.style.display = 'none';
              break;
            case 'error':
              overlay.style.display = 'none';
              break;
          }
        });
      })();
    </script>

    <script type="module" src="auth.js"></script>
    <script src="index.js"></script>
  </body>
</html>
